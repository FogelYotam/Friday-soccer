<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;direction:rtl;
  padding:12px;min-height:100vh;max-width:480px;margin:0 auto}
h1{text-align:center;padding:14px;font-size:1.35rem;
  background:linear-gradient(135deg,#1e3a8a,#065f46);color:#fbbf24;

.card{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;margin-bottom:12px}

  padding:11px 12px;font-size:1rem;width:100%;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:#fbbf24}

<body>
<h1>⚽ כדורגל שישי</h1>

<!-- TOKEN SETUP -->
<div class="card" id="tokenCard">
  <h2>🔑 חיבור ל-GitHub</h2>
  <div class="token-show" id="tokenShow">לא מחובר</div>
  <label>Personal Access Token</label>
  <input type="password" id="tokenInput" placeholder="ghp_...">
  <button class="btn btn-gold" onclick="saveToken()">שמור וחבר</button>
  <div id="tokenErr" style="color:#fca5a5;font-size:.8rem;margin-top:6px;display:none"></div>
  <div class="token-info">
    יצירת טוקן: GitHub → Settings → Developer settings →
    Personal access tokens → Tokens (classic) → Generate new →
    בחר <b>repo</b> → Copy &amp; הדבק כאן
  </div>
</div>

<!-- MAIN (shown after token) -->
<div id="mainSection" style="display:none">
  <div id="loadStatus" class="status st-load">⏳ טוען...</div>

  <div class="card">
    <h2>⚖️ קביעת כוחות</h2>
    <label>מי הגיע היום? (שם בכל שורה, או מופרדים בפסיק)</label>
    <textarea id="rosterBox" rows="6" placeholder="עידן&#10;פוגל&#10;מוטי&#10;..."
      style="background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:11px 12px;font-size:1rem;width:100%;resize:vertical"></textarea>
    <button class="btn btn-gold" onclick="parseRoster()">🔍 זהה שחקנים</button>
    <div id="rosterStatus" style="margin-top:10px"></div>

    <div id="splitOpts" style="display:none">
      <hr class="sep">
      <label>איך לחלק?</label>
      <button class="btn btn-gray" onclick="makeTeams('balanced')">⚖️ הכי מאוזן</button>
      <button class="btn btn-gray" onclick="makeTeams('rematch')">🔁 משחק חוזר</button>
      <button class="btn btn-gray" onclick="makeTeams('surprise')">🎲 משחק הפתעה</button>
      <button class="btn btn-gray" onclick="makeTeams('devatt')">🛡️ הגנה מול התקפה</button>
      <div id="splitResult" style="margin-top:12px"></div>
    </div>
  </div>

  <div class="card">
    <h2>📋 משחק חדש</h2>

    <label>תאריך</label>
    <input type="date" id="gameDate">

    <hr class="sep">
    <h3 style="color:#3b82f6">קבוצה א׳</h3>
    <div class="col-heads"><span>שחקן</span><span>שע׳</span><span>בישול</span><span></span></div>
    <div id="teamA"></div>
    <button class="add-btn" onclick="addRow('A')">+ הוסף שחקן</button>

    <hr class="sep">
    <h3 style="color:#ef4444">קבוצה ב׳</h3>
    <div class="col-heads"><span>שחקן</span><span>שע׳</span><span>בישול</span><span></span></div>
    <div id="teamB"></div>
    <button class="add-btn" onclick="addRow('B')">+ הוסף שחקן</button>

    <div class="score-box">
      <div class="score-big" id="scoreDisplay">0 – 0</div>
      <div class="score-lbl" id="scoreLbl">תיקו</div>
    </div>

    <hr class="sep">
    <h3>🏅 פרסים (אופציונלי)</h3>
    <label>MVP המשחק</label>
    <select id="mvpSelect"><option value="">— ללא —</option></select>
    <div id="wgDiv">
      <label>⚡ שער ניצחון</label>
      <select id="wgSelect"><option value="">— ללא —</option></select>
    </div>

    <button class="btn btn-green" id="saveBtn" onclick="saveGame()">💾 שמור ופרסם</button>
    <button class="btn btn-gray" onclick="resetForm()">🗑️ נקה טופס</button>
    <div id="saveStatus" style="margin-top:10px"></div>
  </div>
</div>

<datalist id="playerList"></datalist>

<script>
const OWNER = 'FogelYotam';
const REPO  = 'Friday-soccer';
const FILE  = 'games_data.json';

let gamesData    = [];
let knownPlayers = new Set();
let currentSHA   = '';

// ─── TEAM BALANCER ──────────────────────────────────────────
// Same name normalisation and roles the dashboard uses.
const MERGE_MAP = {
  "אסף ד":"אסף","אסף ש":"אסף",'אסף ד"ר':"אסף","אסף דר":"אסף","קצל":"קצ'ל",
  "בבצוק":"בבצ'וק","באבצוק":"בבצ'וק","יוני?":"יוני","מוטי?":"מוטי",
  "יוני חבר של רן":"יוני","יוני- אורח":"יוני","אייל-אורח":"אייל",
  "תומר":"תומר סגל","אסף חדש":"אסף בן ארי","אסף חבר של פוגל":"אסף בן ארי",
  "זלציקי":"זליצקי","קליטו":"קרליטו",
};
const ROLE_OVERRIDE = {
  "מיקי":"שוער","אמנון":"שוער","ירון":"שוער","ברק":"שוער","רפי":"שוער",
  "ביטון":"שוער","בבצ'וק":"שוער",
  "מוטי":"התקפה","לירן":"התקפה","שי":"התקפה","זיו":"התקפה",
  "קצ'ל":"הגנה","און":"הגנה","רן":"הגנה","אייל":"הגנה",
  "דורי":"הגנה","אילן":"הגנה","פוגל":"הגנה","אסף בן ארי":"הגנה",
};
const norm = n => { n=(n||'').trim(); return MERGE_MAP[n]||n; };
function parseDate(d){
  const p=(d||'').split('/'); if(p.length!==3) return 0;
  return new Date(+p[2], +p[0]-1, +p[1]).getTime();
}
let ELO={}, ROLE={}, PAIR_LAST={}, LAST_GAME=null;
const pairKey=(a,b)=> a<b ? a+'|'+b : b+'|'+a;

function buildRatings(){
  const R={}, gm={}, gl={}, as={};
  const sorted=[...gamesData].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  const get=n=>(n in R)?R[n]:1500;
  sorted.forEach(g=>{
    const tA=(g.teamA||[]).map(p=>norm(p.name)).filter(Boolean);
    const tB=(g.teamB||[]).map(p=>norm(p.name)).filter(Boolean);
    if(!tA.length||!tB.length) return;
    const Ra=tA.reduce((s,n)=>s+get(n),0)/tA.length;
    const Rb=tB.reduce((s,n)=>s+get(n),0)/tB.length;
    const Ea=1/(1+Math.pow(10,(Rb-Ra)/400));
    const sA=g.scoreA??0, sB=g.scoreB??0;
    const Sa=sA>sB?1:sA<sB?0:0.5, dA=28*(Sa-Ea), t=parseDate(g.date);
    tA.forEach(n=>R[n]=get(n)+dA); tB.forEach(n=>R[n]=get(n)-dA);
    [[tA,g.teamA],[tB,g.teamB]].forEach(([names,raw])=>{
      names.forEach((n,i)=>{ gm[n]=(gm[n]||0)+1; gl[n]=(gl[n]||0)+((raw[i]||{}).goals||0); as[n]=(as[n]||0)+((raw[i]||{}).assists||0); });
      for(let i=0;i<names.length;i++) for(let j=i+1;j<names.length;j++)
        PAIR_LAST[pairKey(names[i],names[j])]=t;
    });
    LAST_GAME={date:g.date, A:new Set(tA), B:new Set(tB)};
  });
  ELO={}; Object.keys(R).forEach(n=>ELO[n]=Math.round(R[n]));
  // roles: manual map first, else infer from attacking involvement
  const contrib={}, list=[];
  Object.keys(gm).forEach(n=>{ if(gm[n]>=5){ contrib[n]=((gl[n]||0)+(as[n]||0))/gm[n]; list.push(contrib[n]); } });
  list.sort((a,b)=>a-b);
  const med=list.length?list[Math.floor(list.length/2)]:1;
  ROLE={};
  Object.keys(gm).forEach(n=>{
    if(ROLE_OVERRIDE[n]) { ROLE[n]=ROLE_OVERRIDE[n]; return; }
    const c=contrib[n];
    if(c===undefined){ ROLE[n]='התקפה'; return; }
    if(gm[n]>=30 && (gl[n]/gm[n])<0.25 && (as[n]/gm[n])<0.25) ROLE[n]='שוער';
    else ROLE[n] = c>=med ? 'התקפה' : 'הגנה';
  });
}

let roster=[];   // [{name, elo, role, known}]
function parseRoster(){
  const raw=document.getElementById('rosterBox').value||'';
  const names=raw.split(/[\n,;\t]+/).map(s=>s.replace(/^\s*[-–•*\d.)]+\s*/,'').trim()).filter(Boolean);
  const seen=new Set(); roster=[];
  names.forEach(n0=>{
    const n=norm(n0);
    if(seen.has(n)) return; seen.add(n);
    roster.push({name:n, elo:ELO[n]??1500, role:ROLE[n]||'התקפה', known:knownPlayers.has(n)});
  });
  const el=document.getElementById('rosterStatus');
  if(roster.length<4){ el.innerHTML=`<div class="status st-err">צריך לפחות 4 שחקנים (זוהו ${roster.length})</div>`;
    document.getElementById('splitOpts').style.display='none'; return; }
  const icon=r=>r==='שוער'?'🧤':r==='הגנה'?'🛡️':'⚔️';
  const newOnes=roster.filter(p=>!p.known);
  el.innerHTML=`<div class="status st-ok">זוהו ${roster.length} שחקנים</div>
    <div style="font-size:.8rem;color:#94a3b8;line-height:1.9;margin-top:6px">
    ${roster.map(p=>`<span style="display:inline-block;background:#0f172a;border:1px solid #334155;border-radius:12px;padding:2px 9px;margin:2px">
      ${icon(p.role)} ${p.name} <b style="color:#fbbf24">${p.elo}</b>${p.known?'':' <span style="color:#f59e0b">✦חדש</span>'}</span>`).join('')}</div>
    ${newOnes.length?`<div style="font-size:.72rem;color:#f59e0b;margin-top:6px">✦ ${newOnes.length} שחקנים חדשים — קיבלו דירוג התחלתי 1500</div>`:''}`;
  document.getElementById('splitOpts').style.display='block';
  document.getElementById('splitResult').innerHTML='';
}

// enumerate every way to split into two near-equal teams
function eachSplit(cb){
  const n=roster.length, half=Math.floor(n/2);
  const idx=[...Array(n).keys()];
  const combo=(start,pick,acc)=>{
    if(acc.length===pick){ cb(acc.slice()); return; }
    for(let i=start;i<n;i++){ acc.push(idx[i]); combo(i+1,pick,acc); acc.pop(); }
  };
  combo(0,half,[]);
}
const teamsOf = sel => {
  const A=sel.map(i=>roster[i]);
  const B=roster.filter((_,i)=>!sel.includes(i));
  return [A,B];
};
const sum   = t => t.reduce((s,p)=>s+p.elo,0);
const cnt   = (t,r) => t.filter(p=>p.role===r).length;
const posGap= (A,B) => Math.abs(cnt(A,'שוער')-cnt(B,'שוער'))*120
                     + Math.abs(cnt(A,'הגנה')-cnt(B,'הגנה'))*40
                     + Math.abs(cnt(A,'התקפה')-cnt(B,'התקפה'))*40;
const eloGap= (A,B) => Math.abs(sum(A)/A.length - sum(B)/B.length);
// average days since each pair of team-mates last played together (higher = fresher)
function freshness(A,B){
  const now=Date.now(); let tot=0,n=0;
  [A,B].forEach(t=>{ for(let i=0;i<t.length;i++) for(let j=i+1;j<t.length;j++){
    const last=PAIR_LAST[pairKey(t[i].name,t[j].name)];
    tot += last ? (now-last)/86400000 : 3000;   // never played together = very fresh
    n++;
  }});
  return n?tot/n:0;
}

function makeTeams(mode){
  if(roster.length<4) return;
  let best=null, bestScore=Infinity;
  if(mode==='devatt'){
    // defenders + keepers on one side, attackers on the other; even out the sizes
    let D=roster.filter(p=>p.role!=='התקפה').slice();
    let A=roster.filter(p=>p.role==='התקפה').slice();
    const moveOne=(from,to)=>{ from.sort((x,y)=>y.elo-x.elo); to.push(from.pop()); };
    while(D.length-A.length>1) moveOne(D,A);
    while(A.length-D.length>1) moveOne(A,D);
    best=[D,A];
  } else {
    eachSplit(sel=>{
      const [A,B]=teamsOf(sel);
      let score;
      if(mode==='balanced')      score = eloGap(A,B) + posGap(A,B);
      else if(mode==='rematch'){
        if(!LAST_GAME){ score = eloGap(A,B); }
        else {
          // how many players sit on the same side as last time (best orientation)
          const agree=(X,Y)=> X.filter(p=>LAST_GAME.A.has(p.name)).length + Y.filter(p=>LAST_GAME.B.has(p.name)).length;
          const same=Math.max(agree(A,B), agree(B,A));
          score = -same*1000 + eloGap(A,B);      // reproduce first, balance as tie-break
        }
      }
      else if(mode==='surprise') score = -freshness(A,B)*2 + eloGap(A,B) + posGap(A,B);
      if(score<bestScore){ bestScore=score; best=[A,B]; }
    });
  }
  showSplit(best[0], best[1], mode);
}

function showSplit(A,B,mode){
  const label={balanced:'⚖️ הכי מאוזן', rematch:'🔁 משחק חוזר', surprise:'🎲 משחק הפתעה', devatt:'🛡️ הגנה מול התקפה'}[mode];
  const icon=r=>r==='שוער'?'🧤':r==='הגנה'?'🛡️':'⚔️';
  const col=t=>t.map(p=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1e293b">
      <span>${icon(p.role)} ${p.name}</span><span style="color:#fbbf24">${p.elo}</span></div>`).join('');
  const avg=t=>Math.round(sum(t)/t.length);
  const fresh=Math.round(freshness(A,B));
  window._splitA=A; window._splitB=B;
  document.getElementById('splitResult').innerHTML=`
    <div style="font-size:.8rem;color:#64748b;margin-bottom:6px">${label} · פער ממוצע ${Math.abs(avg(A)-avg(B))} נק׳ · טריות ${fresh} ימים</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="background:#0f172a;border-top:3px solid #3b82f6;border-radius:8px;padding:8px">
        <div style="color:#3b82f6;font-weight:bold;font-size:.85rem;margin-bottom:4px">קבוצה א׳ · ${avg(A)}</div>${col(A)}</div>
      <div style="background:#0f172a;border-top:3px solid #ef4444;border-radius:8px;padding:8px">
        <div style="color:#ef4444;font-weight:bold;font-size:.85rem;margin-bottom:4px">קבוצה ב׳ · ${avg(B)}</div>${col(B)}</div>
    </div>
    <button class="btn btn-green" onclick="applySplit()">✓ השתמש בהרכב הזה</button>`;
}

function applySplit(){
  const A=window._splitA||[], B=window._splitB||[];
  ['teamA','teamB'].forEach(id=>document.getElementById(id).innerHTML='');
  A.forEach(p=>addRow('A')); B.forEach(p=>addRow('B'));
  document.querySelectorAll('#teamA .p-name').forEach((inp,i)=>{ if(A[i]){ inp.value=A[i].name; onName(inp); }});
  document.querySelectorAll('#teamB .p-name').forEach((inp,i)=>{ if(B[i]){ inp.value=B[i].name; onName(inp); }});
  updateScore();
  document.getElementById('gameDate').scrollIntoView({behavior:'smooth', block:'start'});
}

// ─── TOKEN ──────────────────────────────────────────────────
function getToken(){ return localStorage.getItem('gh_token')||''; }

function saveToken(){
  const t = document.getElementById('tokenInput').value.trim();
  if (!t){ showTokenErr('הכנס טוקן'); return; }
  localStorage.setItem('gh_token', t);
  document.getElementById('tokenInput').value = '';
  document.getElementById('tokenErr').style.display = 'none';
  refreshTokenUI();
  initApp();
}

function refreshTokenUI(){
  const t = getToken();
  const el = document.getElementById('tokenShow');
  el.textContent = t ? `✓ מחובר (…${t.slice(-4)})` : 'לא מחובר';
  el.style.color  = t ? '#10b981' : '#64748b';
}

function showTokenErr(msg){
  const el = document.getElementById('tokenErr');
  el.textContent = msg; el.style.display = 'block';
}

// ─── INIT ────────────────────────────────────────────────────
async function initApp(){
  if (!getToken()) return;
  document.getElementById('mainSection').style.display = 'block';
  setLS('st-load','⏳ טוען נתונים מ-GitHub...');
  try {
    await loadGames();
    setLS('st-ok', `✓ ${gamesData.length} משחקים נטענו`);
    setDefaultDate();
    initTeams();
  } catch(e){
    setLS('st-err','❌ שגיאה בטעינה: ' + e.message);
  }
}

function setLS(cls, msg){
  const el = document.getElementById('loadStatus');
  el.className = 'status '+cls; el.textContent = msg;
}

// ─── LOAD ────────────────────────────────────────────────────
async function loadGames(){
  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
    { headers:{ Authorization:`token ${getToken()}`, Accept:'application/vnd.github.v3+json' } }
  );
  if (!res.ok) throw new Error(`GitHub ${res.status}`);
  const data = await res.json();
  currentSHA = data.sha;
  gamesData  = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));

  knownPlayers = new Set();
  gamesData.forEach(g=>{
    [...(g.teamA||[]),...(g.teamB||[])].forEach(p=>{ if(p.name) knownPlayers.add(p.name); });
  });
  const freq={};
  gamesData.slice(-150).forEach(g=>{
    [...(g.teamA||[]),...(g.teamB||[])].forEach(p=>{ if(p.name) freq[p.name]=(freq[p.name]||0)+1; });
  });
  document.getElementById('playerList').innerHTML =
    Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(e=>`<option value="${e[0]}">`).join('');

  buildRatings();   // ELO + roles + pair history, for the team balancer
}

// ─── DATE ────────────────────────────────────────────────────
function setDefaultDate(){
  const d=new Date(), day=d.getDay();
  const back = day===5?0 : day===6?1 : (day+2)%7;
  d.setDate(d.getDate()-back);
  document.getElementById('gameDate').value = d.toISOString().split('T')[0];
}
function toGameDate(iso){ const[y,m,d]=iso.split('-'); return `${+m}/${+d}/${y}`; }

// ─── TEAMS ───────────────────────────────────────────────────
function initTeams(){
  ['teamA','teamB'].forEach(id=>document.getElementById(id).innerHTML='');
  for(let i=0;i<4;i++){ addRow('A'); addRow('B'); }
}

function addRow(t){
  const d=document.createElement('div');
  d.className='player-row';
  d.innerHTML=`
    <div class="p-wrap">
      <input type="text" list="playerList" placeholder="שם שחקן" class="p-name" oninput="onName(this)">
      <span class="new-badge">✦ שחקן חדש</span>
    </div>
    <input type="number" min="0" value="0" class="p-goals" oninput="updateScore()">
    <input type="number" min="0" value="0" class="p-assists">
    <button class="rm-btn" onclick="this.closest('.player-row').remove();updateScore()">✕</button>`;
  document.getElementById(`team${t}`).appendChild(d);
}

function getTeam(t){
  return [...document.querySelectorAll(`#team${t} .player-row`)]
    .filter(r=>r.querySelector('.p-name').value.trim())
    .map(r=>({
      name:    r.querySelector('.p-name').value.trim(),
      goals:   +r.querySelector('.p-goals').value||0,
      assists: +r.querySelector('.p-assists').value||0
    }));
}

// ─── NEW PLAYER ──────────────────────────────────────────────
function onName(inp){
  const name=inp.value.trim(), badge=inp.nextElementSibling;
  const isNew=name.length>0 && !knownPlayers.has(name);
  inp.classList.toggle('is-new',isNew);
  badge.style.display=isNew?'block':'none';
  updateScore();
}

// ─── SCORE + AWARDS ──────────────────────────────────────────
function updateScore(){
  const sA=getTeam('A').reduce((s,p)=>s+p.goals,0);
  const sB=getTeam('B').reduce((s,p)=>s+p.goals,0);
  const el=document.getElementById('scoreDisplay');
  const lb=document.getElementById('scoreLbl');
  el.textContent=`${sA} – ${sB}`;
  if(sA>sB){el.style.color='#10b981';lb.textContent='ניצחון א׳';}
  else if(sB>sA){el.style.color='#ef4444';lb.textContent='ניצחון ב׳';}
  else{el.style.color='#fbbf24';lb.textContent='תיקו';}
  updateAwards(sA,sB);
}

function updateAwards(sA,sB){
  const all=[...getTeam('A'),...getTeam('B')].map(p=>p.name).filter(Boolean);
  const mvp=document.getElementById('mvpSelect'), prevM=mvp.value;
  mvp.innerHTML='<option value="">— ללא —</option>'+all.map(n=>`<option>${n}</option>`).join('');
  if(all.includes(prevM)) mvp.value=prevM;

  const wg=document.getElementById('wgSelect'), prevW=wg.value;
  const draw=sA===sB;
  document.getElementById('wgDiv').style.opacity=draw?'0.4':'1';
  wg.disabled=draw;
  if(draw){wg.value='';return;}
  const pool=(sA>sB?getTeam('A'):getTeam('B')).map(p=>p.name).filter(Boolean);
  wg.innerHTML='<option value="">— ללא —</option>'+pool.map(n=>`<option>${n}</option>`).join('');
  if(pool.includes(prevW)) wg.value=prevW;
}

// ─── SAVE → GITHUB ───────────────────────────────────────────
async function saveGame(){
  const dateVal=document.getElementById('gameDate').value;
  if(!dateVal){alert('נא לבחור תאריך');return;}
  const tA=getTeam('A'), tB=getTeam('B');
  if(tA.length<2){alert('קבוצה א׳ – לפחות 2 שחקנים');return;}
  if(tB.length<2){alert('קבוצה ב׳ – לפחות 2 שחקנים');return;}

  const sA=tA.reduce((s,p)=>s+p.goals,0), sB=tB.reduce((s,p)=>s+p.goals,0);
  const gameDate=toGameDate(dateVal);
  if(gamesData.find(g=>g.date===gameDate))
    if(!confirm(`כבר קיים משחק ב-${gameDate}. להוסיף בכל זאת?`)) return;

  const game={date:gameDate, teamA:tA, teamB:tB, scoreA:sA, scoreB:sB};
  const mvp=document.getElementById('mvpSelect').value||null;
  const wg =document.getElementById('wgSelect').value||null;
  if(mvp) game.mvp=mvp;
  if(wg)  game.wg=wg;
  gamesData.push(game);

  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='⏳ שומר...';
  const statusEl=document.getElementById('saveStatus');
  statusEl.innerHTML='';

  try {
    await commitGitHub(gameDate);
    const res=sA>sB?'ניצחון א׳':sB>sA?'ניצחון ב׳':'תיקו';
    statusEl.innerHTML=`<div class="status st-ok">
      ✅ נשמר! ${gameDate} — ${sA}:${sB} (${res})<br>
      🤖 האתר מתעדכן אוטומטית — תוך כ-2 דקות הדשבורד יהיה מעודכן.
    </div>`;
    setLS('st-ok',`✓ ${gamesData.length} משחקים`);
  } catch(e){
    gamesData.pop();
    statusEl.innerHTML=`<div class="status st-err">❌ שגיאה: ${e.message}</div>`;
  } finally {
    btn.disabled=false; btn.textContent='💾 שמור ופרסם';
  }
}

async function commitGitHub(dateLabel){
  // Fetch fresh SHA every time — avoids stale SHA between saves
  const getRes=await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
    { headers:{ Authorization:`token ${getToken()}`, Accept:'application/vnd.github.v3+json' } }
  );
  if(!getRes.ok) throw new Error(`שגיאת טעינה: ${getRes.status}`);
  const fileInfo=await getRes.json();

  const content=btoa(unescape(encodeURIComponent(JSON.stringify(gamesData,null,2))));
  const res=await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
    { method:'PUT',
      headers:{ Authorization:`token ${getToken()}`, 'Content-Type':'application/json' },
      body:JSON.stringify({ message:`Add game ${dateLabel}`, content, sha:fileInfo.sha })
    }
  );
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||res.status); }
  const data=await res.json();
  currentSHA=data.content.sha;
}

// ─── RESET ───────────────────────────────────────────────────
function resetForm(){
  initTeams(); setDefaultDate(); updateScore();
  document.getElementById('mvpSelect').value='';
  document.getElementById('wgSelect').value='';
  document.getElementById('saveStatus').innerHTML='';
}

// ─── BOOT ────────────────────────────────────────────────────
refreshTokenUI();
if(getToken()) initApp();
</script>
